<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - ParkingMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid container">
            <span class="navbar-brand">ParkingMS Dashboard</span>
            <div class="d-flex align-items-center gap-3 text-white">
                <span>Hello, {{ username }} ({{ role }})</span>
                <a class="btn btn-sm btn-outline-light" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div id="globalMessage"></div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Add Vehicle Entry</h5>
                        <form id="addVehicleForm" class="mt-3" novalidate>
                            <input class="form-control mb-2" name="owner_name" placeholder="Owner name" required />
                            <input class="form-control mb-2" name="vehicle_number" placeholder="Vehicle number" required />
                            <select class="form-select mb-2" name="vehicle_type" required>
                                <option value="">Select Type</option>
                                <option>Car</option>
                                <option>Bike</option>
                                <option>Truck</option>
                            </select>
                            <button class="btn btn-primary w-100" type="submit">Add Entry</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Exit Vehicle</h5>
                        <form id="exitVehicleForm" class="mt-3" novalidate>
                            <input class="form-control mb-2" name="vehicle_number" placeholder="Vehicle number" required />
                            <button class="btn btn-warning w-100" type="submit">Process Exit</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Search Parked Vehicles</h5>
                        <div class="d-flex gap-2 mt-3">
                            <input id="searchVehicleInput" class="form-control" placeholder="Search by number" />
                            <button id="searchVehicleBtn" class="btn btn-secondary">Search</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mt-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0">Currently Parked Vehicles</h5>
                    <button class="btn btn-sm btn-outline-primary" id="refreshVehiclesBtn">Refresh</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped" id="vehiclesTable">
                        <thead>
                            <tr>
                                <th>Vehicle #</th>
                                <th>Owner</th>
                                <th>Type</th>
                                <th>Entry Time (UTC)</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        {% if role == 'admin' %}
        <div class="card shadow-sm mt-4">
            <div class="card-body">
                <h5>Admin Panel</h5>
                <div class="row g-3 mt-1">
                    <div class="col-md-6">
                        <button class="btn btn-outline-dark w-100" id="loadUsersBtn">View All Users</button>
                        <ul id="usersList" class="list-group mt-3"></ul>
                    </div>
                    <div class="col-md-6">
                        <button class="btn btn-outline-dark w-100" id="loadHistoryBtn">View Parking History</button>
                        <div id="earningsSummary" class="alert alert-info mt-3 d-none"></div>
                        <ul id="historyList" class="list-group"></ul>
                    </div>
                </div>
            </div>
        </div>
        {% endif %}
    </main>

    <script>
        window.APP_CONTEXT = {
            role: "{{ role }}"
        };
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
